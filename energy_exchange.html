<!-- Section des transferts actifs -->
<div class="transfers-section">
    <h3><i class="fas fa-exchange-alt" style="color: #00ff88;"></i> Transferts d'énergie actifs</h3>
    <div id="transfersList"></div>
</div>

<script>
function displayTransfers() {
    const transfers = [
        { from: "Maison Bleue", to: "Maison Verte", amount: 2.4, status: "active" },
        { from: "Maison Rouge", to: "Maison Orange", amount: 1.8, status: "active" }
    ];
    
    const container = document.getElementById('transfersList');
    container.innerHTML = transfers.map(t => `
        <div class="transfer-card">
            <div class="transfer-flow">
                <span class="house-from">🏠 ${t.from}</span>
                <i class="fas fa-arrow-right transfer-arrow"></i>
                <span class="house-to">🏠 ${t.to}</span>
            </div>
            <div class="transfer-amount">⚡ ${t.amount} kWh</div>
            <div class="transfer-status">✅ Blockchain confirmé</div>
        </div>
    `).join('');
}
</script>
