<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Energy Exchange - Blockchain SmartCas</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a0a2a 0%, #0f0f1a 100%);
            color: white;
            min-height: 100vh;
        }
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 50px;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 100;
        }
        .logo { font-size: 26px; font-weight: 800; background: linear-gradient(135deg, #00ff88, #00b4db); -webkit-background-clip: text; background-clip: text; color: transparent; cursor: pointer; }
        .logo i { color: #00ff88; margin-right: 10px; }
        .nav-links { display: flex; gap: 30px; align-items: center; }
        .nav-links a { color: white; text-decoration: none; font-weight: 500; transition: 0.3s; }
        .nav-links a:hover { color: #00ff88; }
        .btn-back { background: rgba(255,255,255,0.1); padding: 10px 25px; border-radius: 30px; }
        
        .container { padding: 100px 50px 50px; max-width: 1400px; margin: 0 auto; }
        
        h1 { font-size: 36px; margin-bottom: 10px; }
        .subtitle { color: rgba(255,255,255,0.6); margin-bottom: 40px; }
        
        /* Cartes de bilan */
        .balance-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 40px; }
        .balance-card {
            background: rgba(255,255,255,0.08);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .balance-card.surplus { border-color: #00ff88; background: rgba(0,255,136,0.1); }
        .balance-card.deficit { border-color: #ff4444; background: rgba(255,68,68,0.1); }
        .house-icon { font-size: 40px; margin-bottom: 10px; }
        .house-name { font-size: 20px; font-weight: 600; margin-bottom: 10px; }
        .balance-amount { font-size: 28px; font-weight: 700; margin: 10px 0; }
        .balance-amount.positive { color: #00ff88; }
        .balance-amount.negative { color: #ff4444; }
        .status-badge { display: inline-block; padding: 5px 15px; border-radius: 20px; font-size: 12px; font-weight: 600; }
        .status-surplus { background: rgba(0,255,136,0.2); color: #00ff88; }
        .status-deficit { background: rgba(255,68,68,0.2); color: #ff8888; }
        
        /* Flux d'énergie */
        .flows-section {
            background: rgba(255,255,255,0.05);
            border-radius: 25px;
            padding: 30px;
            margin-bottom: 40px;
        }
        .section-title { font-size: 24px; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        .flows-container { display: flex; flex-direction: column; gap: 15px; }
        .flow-card {
            background: linear-gradient(135deg, rgba(0,255,136,0.1), rgba(0,180,219,0.05));
            border-radius: 15px;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 15px;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.8; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.01); }
        }
        .flow-direction { display: flex; align-items: center; gap: 20px; font-size: 18px; }
        .flow-arrow { font-size: 30px; color: #00ff88; animation: moveArrow 0.8s infinite alternate; }
        @keyframes moveArrow {
            from { transform: translateX(0); }
            to { transform: translateX(10px); }
        }
        .flow-amount { font-size: 24px; font-weight: 700; color: #00ff88; }
        .flow-impact { font-size: 14px; color: rgba(255,255,255,0.6); }
        
        /* Blockchain */
        .blockchain-section {
            background: rgba(0,0,0,0.3);
            border-radius: 25px;
            padding: 30px;
            margin-bottom: 40px;
        }
        .blockchain-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-block {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 15px;
            text-align: center;
        }
        .stat-number { font-size: 32px; font-weight: 700; color: #00ff88; }
        
        .transaction-list { max-height: 300px; overflow-y: auto; }
        .transaction-item {
            background: rgba(255,255,255,0.03);
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
        }
        .transaction-hash { font-family: monospace; color: #00ff88; }
        
        /* Recommandations */
        .recommendations {
            background: linear-gradient(135deg, rgba(255,215,0,0.1), rgba(255,165,0,0.05));
            border-radius: 20px;
            padding: 25px;
            border-left: 4px solid #ffaa00;
        }
        
        @media (max-width: 1024px) { .balance-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 768px) { .container { padding: 80px 20px 30px; } .balance-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo" onclick="window.location.href='index.html'"><i class="fas fa-bolt"></i> SmartCas EnergyChain</div>
        <div class="nav-links">
            <a href="index.html"><i class="fas fa-home"></i> Accueil</a>
            <a href="dashboard.html"><i class="fas fa-chart-line"></i> Mon Dashboard</a>
            <a href="#" class="btn-back" style="background: linear-gradient(135deg, #00ff88, #00b4db);"><i class="fas fa-link"></i> Blockchain Actif</a>
        </div>
    </nav>
    
    <div class="container">
        <h1><i class="fas fa-link" style="color: #00ff88;"></i> Energy Exchange Blockchain</h1>
        <p class="subtitle">Échanges d'énergie intelligents entre les 4 maisons du quartier Maarif</p>
        
        <div id="content">
            <div style="text-align: center; padding: 50px;"><i class="fas fa-spinner fa-spin" style="font-size: 40px;"></i><p>Chargement des données blockchain...</p></div>
        </div>
    </div>
    
    <script>
        async function loadExchangeData() {
            try {
                const response = await fetch('blockchain_transactions.json?_=' + Date.now());
                if (!response.ok) throw new Error('Fichier non trouvé');
                const data = await response.json();
                displayExchangeData(data);
            } catch (error) {
                console.log('Génération de données simulées...');
                displaySimulatedData();
            }
        }
        
        function displayExchangeData(data) {
            const exchanges = data.exchanges || [];
            const blockchain = data.blockchain || [];
            const totalShared = data.total_energy_shared || 0;
            const totalCO2 = data.total_co2_saved || 0;
            
            // Calculer les bilans par maison depuis les échanges
            const houseBalances = {};
            exchanges.forEach(ex => {
                if (!houseBalances[ex.from_house]) houseBalances[ex.from_house] = 0;
                if (!houseBalances[ex.to_house]) houseBalances[ex.to_house] = 0;
                houseBalances[ex.from_house] -= ex.amount;
                houseBalances[ex.to_house] += ex.amount;
            });
            
            const houseNames = ['Maison Verte', 'Maison Bleue', 'Maison Orange', 'Maison Rouge'];
            const finalBalances = {
                'Maison Verte': (houseBalances['Maison Verte'] || 0),
                'Maison Bleue': (houseBalances['Maison Bleue'] || 0),
                'Maison Orange': (houseBalances['Maison Orange'] || 0),
                'Maison Rouge': (houseBalances['Maison Rouge'] || 0)
            };
            
            const content = `
                <div class="balance-grid">
                    ${Object.entries(finalBalances).map(([name, balance]) => `
                        <div class="balance-card ${balance >= 0 ? 'surplus' : 'deficit'}">
                            <div class="house-icon">${name === 'Maison Verte' ? '🏠' : name === 'Maison Bleue' ? '💙' : name === 'Maison Orange' ? '🧡' : '❤️'}</div>
                            <div class="house-name">${name}</div>
                            <div class="balance-amount ${balance >= 0 ? 'positive' : 'negative'}">
                                ${balance >= 0 ? '+' : ''}${balance.toFixed(1)} kWh
                            </div>
                            <span class="status-badge ${balance >= 0 ? 'status-surplus' : 'status-deficit'}">
                                ${balance >= 0 ? '🔋 Producteur net' : '⚠️ Consommateur net'}
                            </span>
                        </div>
                    `).join('')}
                </div>
                
                <div class="flows-section">
                    <div class="section-title"><i class="fas fa-exchange-alt" style="color: #00ff88;"></i> Flux d'énergie actifs</div>
                    <div class="flows-container">
                        ${exchanges.length > 0 ? exchanges.map(ex => `
                            <div class="flow-card">
                                <div class="flow-direction">
                                    <span style="font-weight: 600;">🏠 ${ex.from_house}</span>
                                    <i class="fas fa-arrow-right flow-arrow"></i>
                                    <span style="font-weight: 600;">🏠 ${ex.to_house}</span>
                                </div>
                                <div class="flow-amount">⚡ ${ex.amount} kWh</div>
                                <div class="flow-impact">
                                    <i class="fas fa-leaf" style="color: #00ff88;"></i> ${ex.energy_saved} kg CO₂ économisés
                                </div>
                            </div>
                        `).join('') : '<div style="text-align: center; padding: 20px;">⚡ Aucun transfert actif - Production équilibrée</div>'}
                    </div>
                </div>
                
                <div class="blockchain-section">
                    <div class="section-title"><i class="fas fa-link" style="color: #00ff88;"></i> Blockchain - Transactions enregistrées</div>
                    <div class="blockchain-stats">
                        <div class="stat-block"><div class="stat-number">${totalShared.toFixed(1)}</div><div>kWh partagés</div></div>
                        <div class="stat-block"><div class="stat-number">${totalCO2.toFixed(0)}</div><div>kg CO₂ économisés</div></div>
                        <div class="stat-block"><div class="stat-number">${exchanges.length}</div><div>Transactions</div></div>
                    </div>
                    <div class="transaction-list">
                        ${exchanges.map((ex, idx) => `
                            <div class="transaction-item">
                                <span><i class="fas fa-exchange-alt" style="color: #00ff88;"></i> #${idx+1}</span>
                                <span>${ex.from_house} → ${ex.to_house}</span>
                                <span class="transaction-hash">${ex.amount} kWh</span>
                                <span><i class="fas fa-check-circle" style="color: #00ff88;"></i> confirmé</span>
                            </div>
                        `).join('')}
                    </div>
                </div>
                
                <div class="recommendations">
                    <h3><i class="fas fa-lightbulb" style="color: #ffaa00;"></i> Recommandations IA</h3>
                    <p style="margin-top: 15px;">🔋 Les maisons avec surplus d'énergie (${Object.entries(finalBalances).filter(([_,b]) => b > 0).map(([n]) => n).join(', ')}) peuvent optimiser leur production solaire.</p>
                    <p>⚠️ Les maisons en déficit (${Object.entries(finalBalances).filter(([_,b]) => b < 0).map(([n]) => n).join(', ')}) devraient réduire leur consommation entre 19h et 22h.</p>
                    <p>💡 <strong>Total économisé :</strong> ${totalCO2.toFixed(0)} kg CO₂ grâce au partage d'énergie.</p>
                </div>
            `;
            
            document.getElementById('content').innerHTML = content;
        }
        
        function displaySimulatedData() {
            const simulatedExchanges = [
                { from_house: "Maison Bleue", to_house: "Maison Verte", amount: 2.4, energy_saved: 2.88 },
                { from_house: "Maison Rouge", to_house: "Maison Orange", amount: 1.8, energy_saved: 2.16 },
                { from_house: "Maison Bleue", to_house: "Maison Orange", amount: 0.6, energy_saved: 0.72 }
            ];
            displayExchangeData({ exchanges: simulatedExchanges, total_energy_shared: 4.8, total_co2_saved: 5.76 });
        }
        
        loadExchangeData();
        setInterval(loadExchangeData, 30000);
    </script>
</body>
</html>
