<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Dashboard - SmartCas EnergyChain</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a0a2a 0%, #0f0f1a 100%);
            color: white;
            min-height: 100vh;
        }
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 280px;
            height: 100%;
            background: rgba(10,10,42,0.95);
            backdrop-filter: blur(10px);
            border-right: 1px solid rgba(255,255,255,0.1);
            padding: 25px 20px;
            z-index: 100;
        }
        .logo { font-size: 24px; font-weight: 800; margin-bottom: 30px; text-align: center; padding-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); cursor: pointer; }
        .logo i { color: #00ff88; margin-right: 10px; }
        .user-info { text-align: center; margin-bottom: 30px; padding: 20px; background: rgba(255,255,255,0.05); border-radius: 20px; }
        .avatar { width: 80px; height: 80px; background: linear-gradient(135deg, #00ff88, #00b4db); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 15px; font-size: 36px; }
        .user-name { font-size: 18px; font-weight: 600; margin-bottom: 5px; }
        .user-address { font-size: 12px; color: rgba(255,255,255,0.5); }
        .house-badge { margin-top: 10px; padding: 5px 12px; background: rgba(0,255,136,0.2); border-radius: 20px; font-size: 12px; display: inline-block; }
        .nav-menu { list-style: none; margin-bottom: 30px; }
        .nav-menu li { margin-bottom: 8px; }
        .nav-menu a { display: flex; align-items: center; padding: 12px 15px; color: rgba(255,255,255,0.7); text-decoration: none; border-radius: 12px; transition: 0.3s; }
        .nav-menu a:hover, .nav-menu a.active { background: rgba(0,255,136,0.15); color: #00ff88; }
        .nav-menu i { width: 25px; margin-right: 12px; }
        .logout-btn { width: 100%; background: rgba(255,68,68,0.15); color: #ff8888; border: 1px solid rgba(255,68,68,0.3); padding: 12px; border-radius: 12px; cursor: pointer; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.3s; position: absolute; bottom: 25px; left: 20px; width: calc(100% - 40px); }
        .logout-btn:hover { background: rgba(255,68,68,0.3); }
        .main-content { margin-left: 280px; padding: 25px 30px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; flex-wrap: wrap; gap: 15px; }
        .page-title h1 { font-size: 24px; font-weight: 700; }
        .page-title p { color: rgba(255,255,255,0.5); font-size: 14px; }
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border-radius: 20px; padding: 20px; border: 1px solid rgba(255,255,255,0.1); transition: 0.3s; }
        .stat-card:hover { transform: translateY(-3px); background: rgba(255,255,255,0.08); }
        .stat-icon { font-size: 35px; margin-bottom: 10px; }
        .stat-value { font-size: 28px; font-weight: 700; margin-bottom: 5px; }
        .stat-label { color: rgba(255,255,255,0.6); font-size: 13px; }
        .charts-section { display: grid; grid-template-columns: repeat(2, 1fr); gap: 25px; margin-bottom: 30px; }
        .chart-card { background: rgba(255,255,255,0.05); border-radius: 20px; padding: 20px; border: 1px solid rgba(255,255,255,0.1); }
        .chart-card h3 { margin-bottom: 20px; font-size: 18px; display: flex; align-items: center; gap: 10px; }
        .chart-card canvas { max-height: 280px; }
        .prediction-section { background: linear-gradient(135deg, rgba(0,255,136,0.1), rgba(0,180,219,0.05)); border-radius: 20px; padding: 25px; border: 1px solid rgba(0,255,136,0.3); }
        .prediction-badge { display: inline-block; background: #00ff88; color: #0a0a2a; padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; margin-left: 10px; }
        .last-update { font-size: 11px; color: rgba(255,255,255,0.4); text-align: right; margin-top: 20px; }
        @media (max-width: 1024px) { .stats-grid { grid-template-columns: repeat(2, 1fr); } .charts-section { grid-template-columns: 1fr; } }
        @media (max-width: 768px) { .sidebar { display: none; } .main-content { margin-left: 0; } }
        .loading { display: flex; justify-content: center; align-items: center; height: 200px; }
        .spinner { width: 50px; height: 50px; border: 3px solid rgba(0,255,136,0.3); border-top-color: #00ff88; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo" onclick="window.location.href='index.html'"><i class="fas fa-bolt"></i> SmartCas</div>
        <div class="user-info">
            <div class="avatar"><i class="fas fa-user"></i></div>
            <div class="user-name" id="userName">Chargement...</div>
            <div class="user-address" id="userAddress"></div>
            <div class="house-badge" id="houseBadge"></div>
        </div>
        <ul class="nav-menu">
            <li><a href="#" class="active"><i class="fas fa-tachometer-alt"></i> Mon Dashboard</a></li>
            <li><a href="#"><i class="fas fa-chart-line"></i> Historique</a></li>
            <li><a href="#"><i class="fas fa-robot"></i> Prédictions IA</a></li>
            <li><a href="#"><i class="fas fa-cog"></i> Paramètres</a></li>
        </ul>
        <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Déconnexion</button>
    </div>
    
    <div class="main-content">
        <div class="header">
            <div class="page-title">
                <h1>Mon Dashboard Énergétique</h1>
                <p><i class="fas fa-map-marker-alt"></i> <span id="locationText">Quartier Maarif, Casablanca</span></p>
            </div>
        </div>
        
        <div id="dashboardContent">
            <div class="loading"><div class="spinner"></div><span style="margin-left: 15px;">Chargement de vos données...</span></div>
        </div>
    </div>

    <script>
        let userData = null;
        let consumptionChart = null;
        let predictionChart = null;
        
        function getCurrentUser() {
            const user = localStorage.getItem('smartcas_current_user');
            if (!user) { window.location.href = 'login.html'; return null; }
            return JSON.parse(user);
        }
        
        async function loadUserEnergyData(householdId) {
            try {
                const response = await fetch('user_energy_data.json?_=' + Date.now());
                if (response.ok) {
                    const allData = await response.json();
                    // Chercher les données pour cette maison spécifique
                    for (const [email, data] of Object.entries(allData)) {
                        if (data.household_id === householdId) {
                            return data;
                        }
                    }
                }
                // Données simulées basées sur l'ID maison
                return generateSimulatedData(householdId);
            } catch (error) {
                return generateSimulatedData(householdId);
            }
        }
        
        function generateSimulatedData(houseId) {
            const baseConsumption = [0.8, 0.6, 0.5, 0.4, 0.5, 0.7, 1.2, 1.8, 2.1, 1.9, 1.5, 1.8, 2.0, 1.7, 1.6, 1.9, 2.3, 2.8, 3.2, 3.5, 3.8, 3.2, 2.5, 1.5];
            // Variation par maison pour les rendre différentes
            const variation = (houseId - 2.5) * 0.15;
            const consumption = baseConsumption.map(c => Math.max(0.3, c + variation));
            const predictions = consumption.map(c => c * (0.85 + Math.random() * 0.2));
            const avgConsumption = consumption.reduce((a,b) => a+b, 0) / 24;
            
            const houseNames = { 1: "Maison Verte", 2: "Maison Bleue", 3: "Maison Orange", 4: "Maison Rouge" };
            const houseAddresses = { 1: "Rue des Oliviers", 2: "Boulevard Moulay Youssef", 3: "Avenue Hassan II", 4: "Rue Allal Ben Ahmed" };
            
            return {
                user_name: `Propriétaire ${houseNames[houseId]}`,
                household_id: houseId,
                address: `${houseAddresses[houseId]}, Maarif, Casablanca`,
                hourly_consumption: consumption,
                predictions: predictions,
                stats: {
                    total_consumption_today: consumption.reduce((a,b) => a+b, 0),
                    avg_consumption: avgConsumption,
                    peak_consumption: Math.max(...consumption),
                    min_consumption: Math.min(...consumption),
                    efficiency_score: 65 + (houseId * 3) + Math.random() * 10
                },
                last_update: new Date().toLocaleString()
            };
        }
        
        async function renderDashboard() {
            const user = getCurrentUser();
            if (!user) return;
            
            document.getElementById('userName').innerHTML = user.name || user.email.split('@')[0];
            document.getElementById('userAddress').innerHTML = user.address || 'Quartier Maarif, Casablanca';
            
            // Charger UNIQUEMENT les données de CETTE maison
            userData = await loadUserEnergyData(user.household_id);
            
            const houseNames = { 1: "Verte", 2: "Bleue", 3: "Orange", 4: "Rouge" };
            document.getElementById('houseBadge').innerHTML = `<i class="fas fa-home"></i> Maison ${houseNames[user.household_id]}`;
            
            const content = `
                <div class="stats-grid">
                    <div class="stat-card"><div class="stat-icon"><i class="fas fa-bolt" style="color: #ffaa00;"></i></div><div class="stat-value">${userData.stats.total_consumption_today.toFixed(1)}</div><div class="stat-label">Consommation aujourd'hui (kWh)</div></div>
                    <div class="stat-card"><div class="stat-icon"><i class="fas fa-chart-line" style="color: #00ff88;"></i></div><div class="stat-value">${userData.stats.avg_consumption.toFixed(2)}</div><div class="stat-label">Moyenne par période (kWh)</div></div>
                    <div class="stat-card"><div class="stat-icon"><i class="fas fa-arrow-up" style="color: #ff4444;"></i></div><div class="stat-value">${userData.stats.peak_consumption.toFixed(2)}</div><div class="stat-label">Pic de consommation (kWh)</div></div>
                    <div class="stat-card"><div class="stat-icon"><i class="fas fa-leaf" style="color: #00ff88;"></i></div><div class="stat-value">${userData.stats.efficiency_score.toFixed(0)}<span style="font-size: 16px;">%</span></div><div class="stat-label">Score d'efficacité</div></div>
                </div>
                <div class="charts-section">
                    <div class="chart-card"><h3><i class="fas fa-chart-line" style="color: #ffaa00;"></i> Ma consommation (dernières 24h)</h3><canvas id="consumptionChartCanvas"></canvas></div>
                    <div class="chart-card"><h3><i class="fas fa-robot" style="color: #00ff88;"></i> Prédictions IA <span class="prediction-badge">prochaines 24h</span></h3><canvas id="predictionChartCanvas"></canvas></div>
                </div>
                <div class="prediction-section"><h3><i class="fas fa-brain"></i> Analyse intelligente</h3><p style="margin-bottom: 15px;">Basé sur vos données de consommation réelles :</p><div id="recommendations"></div></div>
                <div class="last-update" id="lastUpdate"></div>
            `;
            
            document.getElementById('dashboardContent').innerHTML = content;
            createConsumptionChart();
            createPredictionChart();
            generateRecommendations();
            document.getElementById('lastUpdate').innerHTML = `🔄 Dernière mise à jour: ${new Date().toLocaleString()}`;
        }
        
        function createConsumptionChart() {
            const ctx = document.getElementById('consumptionChartCanvas').getContext('2d');
            const labels = Array.from({length: 24}, (_, i) => `${i}h`);
            if (consumptionChart) consumptionChart.destroy();
            consumptionChart = new Chart(ctx, {
                type: 'line',
                data: { labels: labels, datasets: [{ label: 'Ma consommation (kWh)', data: userData.hourly_consumption, borderColor: '#ffaa00', backgroundColor: 'rgba(255,170,0,0.1)', fill: true, tension: 0.4, pointRadius: 3, pointBackgroundColor: '#ffaa00' }] },
                options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { labels: { color: 'white' } }, tooltip: { callbacks: { label: (ctx) => `${ctx.raw.toFixed(3)} kWh` } } }, scales: { y: { grid: { color: 'rgba(255,255,255,0.1)' }, ticks: { color: 'white' }, title: { display: true, text: 'kWh', color: 'white' } }, x: { grid: { color: 'rgba(255,255,255,0.1)' }, ticks: { color: 'white', rotation: 45 } } } }
            });
        }
        
        function createPredictionChart() {
            const ctx = document.getElementById('predictionChartCanvas').getContext('2d');
            const labels = Array.from({length: 24}, (_, i) => `H+${i+1}`);
            if (predictionChart) predictionChart.destroy();
            predictionChart = new Chart(ctx, {
                type: 'line',
                data: { labels: labels, datasets: [{ label: 'Prédiction IA (kWh)', data: userData.predictions, borderColor: '#00ff88', backgroundColor: 'rgba(0,255,136,0.1)', fill: true, tension: 0.4, pointRadius: 3, pointBackgroundColor: '#00ff88', borderDash: [5, 5] }] },
                options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { labels: { color: 'white' } }, tooltip: { callbacks: { label: (ctx) => `${ctx.raw.toFixed(3)} kWh prévu` } } }, scales: { y: { grid: { color: 'rgba(255,255,255,0.1)' }, ticks: { color: 'white' }, title: { display: true, text: 'kWh', color: 'white' } }, x: { grid: { color: 'rgba(255,255,255,0.1)' }, ticks: { color: 'white', rotation: 45 } } } }
            });
        }
        
        function generateRecommendations() {
            const peak = userData.stats.peak_consumption;
            const efficiency = userData.stats.efficiency_score;
            let recommendations = [];
            if (peak > 3.0) recommendations.push('🔴 Votre pic de consommation est élevé (>3 kWh). Essayez de décaler l\'utilisation des appareils énergivores après 22h.');
            if (efficiency < 70) recommendations.push('🟡 Votre score d\'efficacité est faible. Programmez un audit énergétique gratuit.');
            const maxIndex = userData.hourly_consumption.indexOf(Math.max(...userData.hourly_consumption));
            recommendations.push(`💡 Votre heure de pointe est vers ${maxIndex}h. Évitez d'utiliser plusieurs appareils à cette heure.`);
            recommendations.push(`🤖 Prédiction IA : Dans 1 heure, votre consommation sera d'environ ${userData.predictions[0].toFixed(2)} kWh.`);
            document.getElementById('recommendations').innerHTML = recommendations.map(r => `<p style="margin: 8px 0;"><i class="fas fa-lightbulb" style="color: #00ff88; margin-right: 10px;"></i>${r}</p>`).join('');
        }
        
        function logout() { localStorage.removeItem('smartcas_current_user'); window.location.href = 'index.html'; }
        
        renderDashboard();
    </script>
</body>
</html>
